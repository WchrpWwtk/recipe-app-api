version: "3.9"

services:
  web:
    build:
      context: .
      args:
        - DEV=true
    ports:
      - "8003:8000"
    volumes:
      - ./recipes:/recipes
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DB_HOST=db
      - DB_NAME=devdb
      - DB_USER=devuser
      - DB_PASS=changeorhacked
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=devdb
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=changeorhacked

volumes:
  dev-db-data: